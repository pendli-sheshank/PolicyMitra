# Golden Q&A set for retrieval recall@5, citation-accuracy, and
# numeric-traceability evaluation (see docs/PRD.md §11, docs/skills.md).
# expected_clause_ids: hand-annotated against the synthetic corpus, used by
# eval/harness/run_retrieval_eval.py for a fully offline recall@5 check.
# expected_answer_facts: hand-verified numeric facts, used as a deterministic
# faithfulness proxy without needing an LLM judge.

