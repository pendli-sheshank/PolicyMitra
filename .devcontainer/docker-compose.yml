version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/PolicyMitra:cached
    command: sleep infinity
    env_file: .env.devcontainer
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16-latest
    env_file: .env.devcontainer
    environment:
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policymitra -d policymitra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
